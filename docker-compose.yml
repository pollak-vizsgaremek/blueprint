services:
  db:
    image: mysql:8.0.39
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blueprint}
      MYSQL_USER: ${MYSQL_USER:-blueprint}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blueprint}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-blueprint}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-blueprint}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER:-blueprint}:${MYSQL_PASSWORD:-blueprint}@db:3306/${MYSQL_DATABASE:-blueprint}"
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-blueprint}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-blueprint}
      MINIO_BUCKET: ${MINIO_BUCKET:-blueprint}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    build:
      context: ./nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blueprint.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.blueprint.entrypoints=websecure"
      - "traefik.http.routers.blueprint.tls=true"
      - "traefik.http.routers.blueprint.tls.certresolver=letsencrypt"
      - "traefik.http.services.blueprint.loadbalancer.server.port=80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db-data:
  minio-data:
